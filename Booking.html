<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הזמנת תור - Manicure Studio</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/booking.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Rubik:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo"><i class="fa-regular fa-gem logo-icon"></i> Manicure Studio</a>
            <nav class="main-nav">
                <button class="nav-toggle" aria-label="פתח תפריט">☰</button>
                <ul class="nav-list">
                    <li><a href="index.html">בית</a></li>

                    <li><a href="services.html" class="btn-primary">הזמן תור</a></li>
                    <li><a href="appointments.html">התורים שלי</a></li>

                    <li><a href="index.html#contact">צור קשר</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="page-header">
            <div class="container">
                <h1>קביעת תור</h1>
            </div>
        </section>

<section class="booking-section">
            <div class="container">
                <div id="booking-wizard" class="styled-form">
                    <div class="booking-progress">
                        <span class="step active">1. פרטים</span>
                        <span class="step">2. צוות וזמן</span>
                        <span class="step">3. אישור</span>
                    </div>

                    <div id="step-1" class="wizard-step active-step">
                        <h3>פרטים אישיים</h3>
                        <div class="form-group">
                            <label for="customerName">שם מלא</label>
                            <input type="text" id="customerName" required>
                        </div>
                        <div class="form-group">
                            <label for="customerPhone">מספר טלפון</label>
                            <input type="tel" id="customerPhone" required>
                        </div>

                        <div class="form-group">
                            <label for="serviceSelect">בחרי טיפול</label>
                            <select id="serviceSelect" required>
                                <option value="">בחר טיפול...</option>
                            </select>
                        </div>

                        <div id="selected-service-info">
                        </div>

                        <button type="button" class="btn-primary" id="btn-next-1">המשך &larr;</button>
                    </div>

                    <div id="step-2" class="wizard-step">
                        <h3>בחירת מועד</h3>
                        <p style="margin-bottom: 20px; color: var(--text-color);">אנא בחרי תאריך ומטפלת</p>
                        <div class="form-group">
                            <label for="staffSelect">בחרי מטפלת</label>
                            <select id="staffSelect" required>
                                <option value="">בחר מטפלת...</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="dateSelect">תאריך</label>
                            <input type="date" id="dateSelect" required>
                        </div>

                        <div class="form-group">
                            <label>שעות פנויות</label>
                            <div id="time-slots" class="time-slots-grid">
                            <input type="hidden" id="selectedTime">
                        </div>

                        <div class="step-buttons">
                            <button type="button" class="btn-outline" id="btn-prev-2">חזור</button>
                            <button type="button" class="btn-primary" id="btn-next-2" disabled>המשך &larr;</button>
                        </div>
                    </div>

                     <div id="step-3" class="wizard-step">
                        <h3>סיכום ואישור</h3>
                        <div class="summary-box">
                            <p><strong>טיפול:</strong> <span id="summary-service"></span></p>
                            <p><strong>מטפלת:</strong> <span id="summary-staff"></span></p>
                            <p><strong>תאריך:</strong> <span id="summary-date"></span></p>
                            <p><strong>שעה:</strong> <span id="summary-time"></span></p>
                            <p><strong>שם:</strong> <span id="summary-name"></span></p>
                            <p><strong>מחיר:</strong> <span id="summary-price"></span></p>
                        </div>
                                                <div class="step-buttons">
                            <button type="button" class="btn-outline" id="btn-prev-3">חזור</button>
                            <button type="button" class="btn-primary" id="btn-submit">אשר הזמנה</button>
                        </div>
                    </div>
                    
                    <div id="success-message" class="wizard-step" style="text-align: center;">
                        <h2 style="color: var(--primary-color);">התור נקבע בהצלחה!</h2>
                        <p style="margin-bottom: 30px;">מחכים לראותך בסטודיו שלנו.</p>
                        <a href="appointments.html" class="btn-primary">לצפייה בתורים שלי</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
