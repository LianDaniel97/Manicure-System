<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צור קשר - Manicure Studio</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Rubik:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo">Manicure Studio</a>
            <nav class="main-nav">
                <button class="nav-toggle" aria-label="פתח תפריט">☰</button>
                <ul class="nav-list">
                    <li><a href="index.html">בית</a></li>
                    <li><a href="services.html">שירותים</a></li>
                    <li><a href="booking.html" class="btn-primary">הזמן תור</a></li>
                    <li><a href="appointments.html">התורים שלי</a></li>
                    <li><a href="about.html">אודות</a></li>
                    <li><a href="contact.html" class="active">צור קשר</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="page-header">
            <div class="container">
                <h1>דברי איתנו</h1>
            </div>
        </section>

        <section class="contact-form-section">
            <div class="container">
                <form id="contact-form" class="styled-form">
                    <div class="form-group">
                        <label for="name">שם מלא</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">אימייל</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">הודעה</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn-primary">שלח הודעה</button>
                    <div class="success-message" style="display:none; color: green; margin-top: 10px;">ההודעה נשלחה
                        בהצלחה!</div>
                </form>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2024 Manicure Studio. כל הזכויות שמורות.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/contact.js"></script>
</body>

</html>
